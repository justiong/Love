<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Forever Love Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.star{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#2a0f1f,#1a1a2e);
color:white;
text-align:center;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin:20px auto;
border-radius:20px;
max-width:600px;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
font-weight:bold;
margin:5px;
cursor:pointer;
}

button:hover{transform:scale(1.05);}

input{
padding:10px;
border-radius:10px;
border:none;
width:80%;
}

/* SCREENS */
.screen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ff2e93,#1a1a2e);
z-index:9999;
}

/* VIDEO */
video{
width:90%;
max-width:500px;
border-radius:15px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>💖 FOREVER LOVE QUIZ 💖</h1>

<div id="start" class="card">
<h2>Enter Name 💕</h2>
<input id="name">
<br><br>
<button onclick="startQuiz()">Start 💖</button>
</div>

<div id="quiz" class="card" style="display:none;">
<h2 id="qText"></h2>
<button onclick="answer(true)">💖 Yes</button>
<button onclick="answer(false)">💔 No</button>
</div>

<!-- 💍 MARRY SCREEN -->
<div id="marry" class="screen">
<h1>💍 WILL YOU MARRY ME? 💍</h1>

<button onclick="finalYes()">YES 💖</button>
<button onclick="finalYes()">YES I LOVE YOU 💖</button>
  <button onclick="openUniverse()">🌌 Ultimate Surprise</button>
</div>

<!-- 🎬 FINAL VIDEO -->
<div id="videoScreen" class="screen">
<h1>💖 OUR LOVE STORY 💖</h1>

<video id="endVideo" controls>
<source src="1.mp4" type="video/mp4">
</video>

<h2>💌 Forever Yours, Sayang 💌</h2>
</div>

<script>
function openUniverse(){

document.getElementById("universe").style.display="block";

createStars();

let load=0;

let interval=setInterval(()=>{

load+=5;

document.getElementById("loveLoad").style.width=load+"%";

spawnHeart();
spawnFlower();

if(load>=100){

clearInterval(interval);

document.getElementById("introBox").style.display="none";

document.getElementById("finalLove").style.display="block";

let vid=document.getElementById("ultimateVideo");

vid.muted=false;

vid.play();

vid.onended=function(){

document.getElementById("marryBox").style.display="block";

};

}

},200);

}

function loveYes(){

spawnHeart();
spawnFlower();

document.getElementById("yesScreen").style.display="block";

let vid=document.getElementById("ultimateVideo");

vid.currentTime=0;

vid.play();

}

function closeUniverse(){

document.getElementById("universe").style.display="none";

document.getElementById("introBox").style.display="block";

document.getElementById("finalLove").style.display="none";

document.getElementById("marryBox").style.display="none";

document.getElementById("yesScreen").style.display="none";

document.getElementById("loveLoad").style.width="0%";

}

function createStars(){

let stars=document.getElementById("stars");

stars.innerHTML="";

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=(Math.random()*3+1)+"s";

stars.appendChild(s);

}

}
function openUniverse(){

document.getElementById("universe").style.display="block";

createStars();

let load=0;

let interval=setInterval(()=>{

load+=5;

document.getElementById("loveLoad").style.width=load+"%";

spawnHeart();
spawnFlower();

if(load>=100){

clearInterval(interval);

document.getElementById("introBox").style.display="none";

document.getElementById("finalLove").style.display="block";

let vid=document.getElementById("ultimateVideo");

vid.muted=false;

vid.play();

vid.onended=function(){

document.getElementById("marryBox").style.display="block";

};

}

},200);

}

function loveYes(){

spawnHeart();
spawnFlower();

document.getElementById("yesScreen").style.display="block";

let vid=document.getElementById("ultimateVideo");

vid.currentTime=0;

vid.play();

}

function closeUniverse(){

document.getElementById("universe").style.display="none";

document.getElementById("introBox").style.display="block";

document.getElementById("finalLove").style.display="none";

document.getElementById("marryBox").style.display="none";

document.getElementById("yesScreen").style.display="none";

document.getElementById("loveLoad").style.width="0%";

}

function createStars(){

let stars=document.getElementById("stars");

stars.innerHTML="";

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=(Math.random()*3+1)+"s";

stars.appendChild(s);

}

}

let q=0;
let name="";

/* 20 QUESTIONS */
let questions=[
"Did we meet at Billion Mall? 💖",
"Do I call you sayang?",
"Do I love you?",
"Do I like tomyam?",
"Do I like pasta?",
"Do I study Information Systems?",
"Do I love tennis?",
"Do I miss you?",
"Do I think about you always?",
"Do I care about you?",
"Do I support you?",
"Do I want your happiness?",
"Do I cook for you?",
"Do I get jealous sometimes?",
"Do I forgive you?",
"Do I want future with you?",
"Do I love your smile?",
"Do I love you more everyday?",
"Are you my forever?",
"Do I truly love you? 💖"
];

function startQuiz(){
name=document.getElementById("name").value;
if(name==="") return alert("Enter name 💖");

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQ();
}

function loadQ(){
if(q<questions.length){
document.getElementById("qText").innerText=
name+", "+questions[q];
}else{
goMarry();
}
}

function answer(val){
q++;
loadQ();
}

/* AFTER 20 Q → MARRY SCREEN */
function goMarry(){
document.getElementById("quiz").style.display="none";
document.getElementById("marry").style.display="flex";
}

/* ONLY YES OPTIONS */
function finalYes(){
document.getElementById("marry").style.display="none";
document.getElementById("videoScreen").style.display="flex";

/* PLAY VIDEO */
let v=document.getElementById("endVideo");
v.play().catch(()=>{});
}

</script>

</body>
</html>
