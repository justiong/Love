<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Forever Love Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BACKGROUND */
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #ff4d6d33, #1a1a2e, #000);
color:white;
text-align:center;
overflow-x:hidden;
animation:bgPulse 6s infinite alternate;
}

@keyframes bgPulse{
0%{filter:brightness(1);}
100%{filter:brightness(1.2);}
}

/* 💖 CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter: blur(12px);
border:1px solid rgba(255,255,255,0.2);
padding:25px;
margin:15px auto;
border-radius:25px;
max-width:700px;
box-shadow:0 0 30px rgba(255,0,100,0.4);
animation:popIn 0.5s ease;
}

@keyframes popIn{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* 💖 BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
font-weight:bold;
margin:5px;
transition:0.2s;
}

button:hover{transform:scale(1.05);}

/* 💖 INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
width:80%;
}

/* 💥 HEART */
.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear forwards;
pointer-events:none;
z-index:9999;
}

@keyframes floatUp{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* ✨ CONFETTI */
.confetti{
position:fixed;
font-size:18px;
animation:fall 4s linear forwards;
pointer-events:none;
}

@keyframes fall{
to{transform:translateY(120vh);opacity:0;}
}

/* 🎬 END SCREEN */
#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,#ff2e93,#0f0f1a);
justify-content:center;
align-items:center;
z-index:99999;
text-align:center;
}

/* 💍 MARRY ME */
#marryMeBox{
margin-top:20px;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.9);}
to{opacity:1;transform:scale(1);}
}

</style>
</head>

<body>

<h1>💖 FOREVER LOVE QUIZ 💖</h1>

<!-- START -->
<div id="start" class="card">
<h2>Enter Your Name 💕</h2>
<input id="name" placeholder="Sayang name">
<br><br>
<button onclick="startQuiz()">Start 💖</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="card" style="display:none;">
<h2 id="question"></h2>
<button onclick="answer(true)">💖 Yes</button>
<button onclick="answer(false)">💔 No</button>
</div>

<!-- END SCREEN -->
<div id="endScreen">

<div class="card">

<h1>🎉 CONGRATULATIONS SAYANG 🎉</h1>

<p>💖 You finished our love quiz 💖</p>

<h3>🎬 Our Memory</h3>

<video id="congratsVideo" width="90%" autoplay muted playsinline>
<source src="1.mp4" type="video/mp4">
</video>

<p style="line-height:1.8;margin-top:20px;">
💌 My sayang…<br><br>
You are my peace 💖<br>
You are my happiness 🌸<br>
You are my forever 💍<br><br>
I will always choose you 💖
</p>

<!-- 💍 MARRY ME SECTION -->
<div id="marryMeBox" style="display:none;">
<h1>💍 SAYANG…</h1>
<h2>Will you marry me?</h2>

<button onclick="acceptMarriage()">💖 YES</button>
<button onclick="acceptMarriage()">💖 YES (FOREVER)</button>
</div>

<br>

<button onclick="location.reload()">🔁 Play Again</button>

<br><br>

<button onclick="showQR('quiz')">📱 Quiz QR</button>
<button onclick="showQR('forever')">💌 Forever QR</button>

</div>
</div>

<!-- QR -->
<div id="qrBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:99999;">

<div class="card">
<h3>💌 Scan Love</h3>
<img id="qrImg" style="width:220px;border-radius:15px;">
<br>
<button onclick="closeQR()">Close 💖</button>
</div>

</div>

<script>

let q=0;
let name="";

/* QUESTIONS */
let questions=[
"Did we meet at Billion Mall? 💖",
"Do I call you sayang?",
"Do I love you?",
"Do I like tomyam?",
"Do I like pasta?",
"Do I study Information Systems?",
"Do I love tennis?",
"Do I miss you?",
"Do I care about you?",
"Do I want you forever?"
];

/* START */
function startQuiz(){
name=document.getElementById("name").value;
if(name==="") return alert("Enter name 💖");

document.getElementById("start").style.display="none";
document.getElementById("quiz").style.display="block";

loadQ();
}

function loadQ(){
if(q<questions.length){
document.getElementById("question").innerText=name+", "+questions[q];
}else{
end();
}
}

function answer(val){
if(val) q++;
loadQ();
}

/* END */
function end(){
document.getElementById("quiz").style.display="none";
document.getElementById("endScreen").style.display="flex";

spawnHearts();
spawnConfetti();

setTimeout(()=>{
document.getElementById("congratsVideo").play().catch(()=>{});
},300);

/* SHOW MARRY ME */
setTimeout(()=>{
document.getElementById("marryMeBox").style.display="block";
},4000);
}

/* HEARTS */
function spawnHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

/* CONFETTI */
function spawnConfetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerHTML="✨";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

/* 💍 MARRY ME FINAL */
function acceptMarriage(){

document.body.innerHTML=`
<div style="
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:radial-gradient(circle,#ff4d6d,#1a1a2e);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
">

<h1 style="font-size:45px;">💍 SHE SAID YES 💍</h1>
<h2>Forever starts now 💖</h2>
<p>I love you always, sayang</p>

</div>
`;

spawnHearts();
spawnConfetti();
}

/* QR */
function showQR(type){

document.getElementById("qrBox").style.display="flex";

let link="";

if(type==="quiz"){
link="https://justiong.github.io/Love/quiz.html";
}

if(type==="forever"){
link="https://justiong.github.io/Love/forever.html";
}

document.getElementById("qrImg").src=
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data="
+encodeURIComponent(link);
}

function closeQR(){
document.getElementById("qrBox").style.display="none";
}

</script>

</body>
</html>
