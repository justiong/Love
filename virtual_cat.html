<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virtual Pet World 💖</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffe0f0,#fff0f8);
min-height:100vh;
overflow-x:hidden;
overflow-y:auto;
display:flex;
justify-content:center;
align-items:center;
}

/* FLOATING ITEMS */
.floatItem{
position:fixed;
font-size:20px;
animation:floatUp 6s linear infinite;
z-index:999;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* MAIN BOX */
.box{
width:360px;
background:white;
border-radius:30px;
padding:20px;
text-align:center;
box-shadow:0 0 30px rgba(255,105,180,0.3);
position:relative;
}

/* PET 3D */
.pet{
font-size:120px;
cursor:pointer;
animation:floatPet 3s ease-in-out infinite;
transition:0.3s;
}

@keyframes floatPet{
0%{transform:translateY(0px) rotateY(0deg);}
50%{transform:translateY(-10px) rotateY(25deg);}
100%{transform:translateY(0px) rotateY(0deg);}
}

h1{
color:#ff3f88;
}

/* BARS */
.bar{
width:100%;
height:15px;
background:#ffd6e8;
border-radius:20px;
overflow:hidden;
margin-bottom:10px;
}

.fill{
height:100%;
width:100%;
background:linear-gradient(90deg,#ff3f88,#ff86b5);
transition:0.3s;
}

/* INPUT */
input{
padding:8px;
border-radius:10px;
border:none;
margin:5px;
outline:none;
}

/* BUTTONS */
button, select{
margin:5px;
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff3f88;
color:white;
cursor:pointer;
}

/* GAME AREA */
#gameArea{
margin-top:10px;
height:90px;
position:relative;
overflow:hidden;
}

.food{
position:absolute;
font-size:22px;
cursor:pointer;
}

/* SMALL TEXT */
.small{
font-size:13px;
color:#a34b70;
}

/* BACK BUTTON (FIXED) */
.backBtn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:30px;
background:#ff3f88;
color:white;
text-decoration:none;
font-weight:bold;
box-shadow:0 0 15px rgba(255,105,180,0.6);
z-index:9999;
}

.backBtn:hover{
transform:translateX(-50%) scale(1.1);
background:#ff69b4;
}

</style>
</head>

<body>

<div class="box">

<!-- PET -->
<div class="pet" id="pet" onclick="petAction()">🐱</div>

<h1 id="petName">Mochi</h1>

<!-- NAME -->
<input id="nameInput" placeholder="Enter pet name">
<button onclick="changeName()">Rename 💖</button>

<!-- PET TYPE -->
<select onchange="changePet(this.value)">
<option value="🐱">Cat 🐱</option>
<option value="🐶">Dog 🐶</option>
<option value="🦊">Fox 🦊</option>
<option value="🐼">Panda 🐼</option>
</select>

<!-- SHIRT -->
<select onchange="changeShirt(this.value)">
<option value="white">White</option>
<option value="pink">Pink</option>
<option value="blue">Blue</option>
<option value="black">Black</option>
</select>

<!-- STATUS -->
<p class="small">Hunger 🍖</p>
<div class="bar"><div class="fill" id="hungerBar"></div></div>

<p class="small">Love 💖</p>
<div class="bar"><div class="fill" id="loveBar"></div></div>

<p class="small">Energy ⚡</p>
<div class="bar"><div class="fill" id="energyBar"></div></div>

<!-- BUTTONS -->
<button onclick="feed()">🍖 Feed</button>
<button onclick="loveUp()">💖 Love</button>
<button onclick="sleep()">😴 Sleep</button>
<button onclick="spawnFood()">🍔 Drop Food</button>

<!-- GAME -->
<div id="gameArea"></div>

<p class="small">Tap food to feed your pet 💖</p>

</div>

<!-- BACK BUTTON -->
<a href="index.html" class="backBtn">⬅ Back Home</a>

<script>

let pet="🐱";
let hunger=100;
let loveVal=100;
let energy=100;

/* UPDATE */
function update(){
document.getElementById("hungerBar").style.width=hunger+"%";
document.getElementById("loveBar").style.width=loveVal+"%";
document.getElementById("energyBar").style.width=energy+"%";
}

/* NAME */
function changeName(){
let name=document.getElementById("nameInput").value;
if(name.trim()!==""){
document.getElementById("petName").innerText=name;
}
}

/* PET */
function changePet(val){
pet=val;
document.getElementById("pet").innerHTML=val;
}

/* SHIRT */
function changeShirt(color){
document.getElementById("pet").style.filter=
color==="black"?"grayscale(1)":
color==="blue"?"hue-rotate(180deg)":
color==="pink"?"hue-rotate(320deg)":"none";
}

/* FEED */
function feed(){
hunger=Math.min(100,hunger+25);
update();
}

/* LOVE */
function loveUp(){
loveVal=Math.min(100,loveVal+20);
update();
}

/* SLEEP */
function sleep(){
energy=Math.min(100,energy+25);
update();
}

/* PET ACTION */
function petAction(){
loveVal=Math.min(100,loveVal+5);
document.getElementById("pet").innerHTML="😻";
setTimeout(()=>document.getElementById("pet").innerHTML=pet,700);
update();
}

/* FOOD GAME */
function spawnFood(){

let food=document.createElement("div");
food.className="food";
food.innerHTML=["🍖","🍔","🍟","🍗"][Math.floor(Math.random()*4)];
food.style.left=Math.random()*300+"px";
food.style.top="0px";

food.onclick=()=>{
hunger=Math.min(100,hunger+15);
food.remove();
update();
};

document.getElementById("gameArea").appendChild(food);

setTimeout(()=>food.remove(),4000);
}

/* FLOATING */
setInterval(()=>{
let f=document.createElement("div");
f.className="floatItem";
f.innerHTML=["💖","✨","🐾"][Math.floor(Math.random()*3)];
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),6000);
},900);

/* DECAY (SMOOTH) */
setInterval(()=>{
hunger=Math.max(0,hunger-1);
loveVal=Math.max(0,loveVal-0.5);
energy=Math.max(0,energy-0.5);
update();
},5000);

update();

</script>

</body>
</html>
