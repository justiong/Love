<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🏹 Love Archery Game</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffe0f0,#ffd6ff,#fff);
overflow:hidden;
text-align:center;
}

/* UI */
#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(255,255,255,0.8);
padding:10px;
border-radius:15px;
display:none;
z-index:999;
}

/* GAME */
#game{
width:100%;
height:100vh;
position:relative;
display:none;
}

/* TARGET */
.target{
position:absolute;
font-size:50px;
cursor:pointer;
}

/* BOW */
#bow{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#ffb6e6,#fff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

button{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3f88;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

#countdown{
font-size:80px;
color:#ff3f88;
display:none;
}

/* BACK BUTTON */
.backBtn{
position:fixed;
bottom:20px;
left:20px;
padding:12px 18px;
background:#ff3f88;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:bold;
z-index:9999;
}
</style>

</head>

<body>

<!-- BACK -->
<a href="index.html" class="backBtn">⬅ Back</a>

<!-- INTRO -->
<div id="intro">

<h1>🏹 Archery Game 💖</h1>

<p>
🎯 Shoot targets to score points<br>
⏱️ 30 seconds challenge<br>
💖 “You got this sayang!”
</p>

<button onclick="startIntro()">Start Game</button>

<div id="countdown">3</div>

</div>

<!-- UI -->
<div id="ui">
🏆 Score: <span id="score">0</span><br>
⏱️ Time: <span id="time">30</span>
</div>

<!-- GAME -->
<div id="game">
<div id="bow">🏹</div>
</div>

<script>

let score=0;
let time=30;
let game=false;

/* START INTRO */
function startIntro(){

let c=3;
document.getElementById("countdown").style.display="block";

let cd=setInterval(()=>{

document.getElementById("countdown").innerText=c;

if(c===0){
clearInterval(cd);
startGame();
}
c--;

},1000);
}

/* START GAME */
function startGame(){

document.getElementById("intro").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("ui").style.display="block";

game=true;
score=0;
time=30;

document.getElementById("score").innerText=score;

/* TIMER */
let t=setInterval(()=>{

time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(t);
game=false;
alert("Game Over 💖 Score: " + score);
}

},1000);

spawn();
}

/* TARGETS */
function spawn(){

if(!game) return;

let target=document.createElement("div");
target.className="target";
target.innerHTML="🎯";

target.style.left=Math.random()*90+"vw";
target.style.top=Math.random()*70+"vh";

document.getElementById("game").appendChild(target);

target.onclick=()=>{
score+=10;
document.getElementById("score").innerText=score;
target.remove();
};

setTimeout(()=>target.remove(),3000);

setTimeout(spawn,700);
}

/* SHOOT EFFECT */
document.addEventListener("click",function(){

if(!game) return;

let arrow=document.createElement("div");
arrow.innerHTML="🏹";
arrow.style.position="absolute";
arrow.style.left="50%";
arrow.style.bottom="60px";
arrow.style.fontSize="30px";

document.getElementById("game").appendChild(arrow);

let y=60;

let move=setInterval(()=>{

y+=10;
arrow.style.bottom=y+"px";

if(y>window.innerHeight){
arrow.remove();
clearInterval(move);
}

},30);

});

</script>

</body>
</html>
