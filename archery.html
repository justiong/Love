<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Easy Love Archery</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffe0f0,#fff,#ffd6ff);
overflow:hidden;
text-align:center;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#ffb6e6,#fff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

button{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3f88;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* UI */
#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(255,255,255,0.85);
padding:10px;
border-radius:15px;
display:none;
z-index:999;
}

/* GAME */
#game{
width:100%;
height:100vh;
position:relative;
display:none;
overflow:hidden;
}

.target{
position:absolute;
font-size:50px;
cursor:pointer;
}

/* BOW */
#bow{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

/* VIDEO */
#videoBox{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

#videoBox video{
width:80%;
border-radius:15px;
}

/* BACK */
#backBtn{
position:fixed;
bottom:20px;
left:20px;
padding:12px 18px;
background:#ff3f88;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:bold;
z-index:100000;
}
</style>
</head>

<body>

<a href="index.html" id="backBtn">⬅ Back</a>

<!-- INTRO -->
<div id="intro">
<h1>🏹 EASY LOVE ARCHERY</h1>
<p>💖 Just click targets for 10 seconds</p>
<button onclick="startGame()">Start 💕</button>
</div>

<!-- UI -->
<div id="ui">
🏆 Score: <span id="score">0</span><br>
⏱️ Time: <span id="time">10</span>
</div>

<!-- GAME -->
<div id="game">
<div id="bow">🏹</div>
</div>

<!-- VIDEO END -->
<div id="videoBox">
<h2 style="color:white;">💖 Sayang You Finished 💖</h2>

<video id="endVideo" controls>
<source src="1.mp4" type="video/mp4">
</video>

<br><br>

<a href="archery.html" style="
padding:12px 18px;
background:#ff3f88;
color:white;
text-decoration:none;
border-radius:20px;
font-weight:bold;
">🔁 Play Again</a>
</div>

<script>

let score = 0;
let time = 10;
let game = false;
let loop;

/* START */
function startGame(){

document.getElementById("intro").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("ui").style.display="block";

score = 0;
time = 10;
game = true;

document.getElementById("score").innerText = score;
document.getElementById("time").innerText = time;

/* TIMER */
let t = setInterval(()=>{

time--;
document.getElementById("time").innerText = time;

if(time <= 0){
clearInterval(t);
endGame(); // ALWAYS WIN
}

},1000);

/* SPAWN */
spawn();
}

/* TARGETS */
function spawn(){

if(!game) return;

let target = document.createElement("div");
target.className="target";
target.innerHTML="🎯";

target.style.left = Math.random()*90 + "vw";
target.style.top = Math.random()*70 + "vh";

document.getElementById("game").appendChild(target);

/* CLICK */
target.onclick = ()=>{
score += 10;
document.getElementById("score").innerText = score;
target.remove();
};

setTimeout(()=>target.remove(),2000);

/* LOOP */
loop = setTimeout(spawn,600);
}

/* END GAME → ALWAYS SHOW VIDEO */
function endGame(){

game = false;
clearTimeout(loop);

document.getElementById("game").style.display="none";
document.getElementById("ui").style.display="none";

document.getElementById("videoBox").style.display="flex";

let video = document.getElementById("endVideo");
video.currentTime = 0;
video.play();

}

</script>

</body>
</html>
