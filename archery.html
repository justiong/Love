<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 10s Love Archery Game</title>

<style>
  #backBtn{
position:fixed;
bottom:20px;
left:20px;
padding:12px 18px;
background:#ff3f88;
color:white;
text-decoration:none;
border-radius:25px;
font-weight:bold;
z-index:100000;
}
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffe0f0,#fff,#ffd6ff);
overflow:hidden;
text-align:center;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,#ffb6e6,#fff);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

button{
padding:12px 18px;
border:none;
border-radius:25px;
background:#ff3f88;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* GAME UI */
#ui{
position:fixed;
top:10px;
left:10px;
background:rgba(255,255,255,0.8);
padding:10px;
border-radius:15px;
display:none;
z-index:999;
}

/* GAME AREA */
#game{
width:100%;
height:100vh;
position:relative;
display:none;
overflow:hidden;
}

/* TARGET */
.target{
position:absolute;
font-size:50px;
cursor:pointer;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0);}
to{transform:scale(1);}
}

/* BOW */
#bow{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:60px;
}

/* MISS FLASH */
.flash{
position:fixed;
width:100%;
height:100%;
background:red;
opacity:0.3;
pointer-events:none;
z-index:9999;
}

/* VIDEO POPUP */
#videoBox{
position:fixed;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}

video{
width:80%;
border-radius:15px;
}
</style>
</head>

<body>
  

<!-- INTRO -->
<div id="intro">
<h1>🏹 10 SEC LOVE ARCHERY</h1>
<p>💖 Hit targets fast or you lose instantly<br>⏱️ Only 10 seconds!</p>
<button onclick="startGame()">Start Game 💕</button>
</div>

<!-- UI -->
<div id="ui">
🏆 Score: <span id="score">0</span><br>
⏱️ Time: <span id="time">10</span>
</div>

<!-- GAME -->
<div id="game">
<div id="bow">🏹</div>
</div>

<!-- VIDEO END -->
<div id="videoBox">
<h2 style="color:white;">💖 YOU WON SAYANG 💖</h2>
<video id="endVideo" controls autoplay>
<source src="1.mp4" type="video/mp4">
</video>
</div>
<a href="index.html" id="backBtn">⬅ Back</a>
<script>

let score = 0;
let time = 10;
let game = false;
let spawnLoop;

/* START GAME */
function startGame(){

document.getElementById("intro").style.display="none";
document.getElementById("game").style.display="block";
document.getElementById("ui").style.display="block";

score = 0;
time = 10;
game = true;

document.getElementById("score").innerText = score;
document.getElementById("time").innerText = time;

/* TIMER */
let t = setInterval(()=>{

time--;
document.getElementById("time").innerText = time;

if(time <= 0){
clearInterval(t);
endGame(true);
}

},1000);

/* SPAWN TARGETS */
spawnTargets();

}

/* SPAWN */
function spawnTargets(){

if(!game) return;

let target = document.createElement("div");
target.className="target";
target.innerHTML="🎯";

target.style.left = Math.random()*90 + "vw";
target.style.top = Math.random()*70 + "vh";

document.getElementById("game").appendChild(target);

/* CLICK HIT */
target.onclick = ()=>{
score += 10;
document.getElementById("score").innerText = score;
target.remove();
};

/* IF MISS = GAME OVER */
setTimeout(()=>{

if(target.parentNode){
target.remove();
endGame(false);
}

},1200);

/* LOOP */
spawnLoop = setTimeout(spawnTargets,400);
}

/* END GAME */
function endGame(win){

game = false;
clearTimeout(spawnLoop);

if(!win){
alert("💔 You Missed! Game Over Sayang!");
location.reload();
return;
}

/* WIN */
document.getElementById("videoBox").style.display="flex";
document.getElementById("endVideo").play();

}

/* SHOOT EFFECT */
document.addEventListener("click",function(e){

if(!game) return;

let arrow = document.createElement("div");
arrow.innerHTML="🏹";
arrow.style.position="absolute";
arrow.style.left = e.clientX + "px";
arrow.style.top = e.clientY + "px";
arrow.style.fontSize="25px";

document.getElementById("game").appendChild(arrow);

setTimeout(()=>arrow.remove(),500);

});

/* FLASH ON MISS */
function flash(){
let f=document.createElement("div");
f.className="flash";
document.body.appendChild(f);
setTimeout(()=>f.remove(),200);
}

</script>

</body>
</html>
