<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Liya x Justin Forever Love App 💖</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* GLOBAL FIX (IMPORTANT FOR LAPTOP SCROLL) */
html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
overflow-x:hidden;
overflow-y:auto;
background:black;
color:white;
height:auto;
}

/* LOCK SCREEN */
#lock{
position:fixed;
width:100%;
height:100%;
background:url('1.jpg');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
}

#time{
font-size:60px;
font-weight:bold;
text-shadow:0 0 20px pink;
}

#date{
font-size:18px;
margin-bottom:20px;
}

#swipe{
padding:15px 25px;
background:rgba(255,20,147,0.8);
border-radius:40px;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:20px;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
overflow-y:auto;
}

/* CARD */
.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin:10px;
}

/* TITLE */
h1{
text-align:center;
color:#ff4fd8;
}

/* BUTTON */
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:20px;
background:#ff1493;
color:white;
cursor:pointer;
}

/* GALLERY */
.gallery{
display:flex;
overflow-x:auto;
gap:8px;
}

.gallery img{
width:120px;
height:120px;
border-radius:15px;
object-fit:cover;
}

/* XP BAR */
.xpBar{
width:90%;
height:15px;
background:#333;
border-radius:20px;
margin:10px auto;
overflow:hidden;
}

.xpFill{
width:70%;
height:100%;
background:linear-gradient(90deg,#ff1493,#ff69b4);
}

/* LOVE LETTER */
.loveLetter{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:20px;
border-radius:20px;
margin:10px;
color:#ffb6d9;
}

/* HEART ANIMATION */
.heart{
position:fixed;
font-size:20px;
animation:float 6s linear infinite;
z-index:9998;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* CAT ANIMATION */
.cat{
position:fixed;
font-size:35px;
animation:catMove 8s linear infinite;
z-index:9999;
}

@keyframes catMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock">
<div id="time">00:00</div>
<div id="date">Loading date...</div>
<div id="swipe" onclick="unlock()">Swipe Up 💖</div>
</div>

<!-- MAIN APP -->
<div id="app">

<h1>💖 Liya x Justin Forever 💖</h1>

<!-- SPOTIFY -->
<div class="card">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/playlist/6AnczgR8DnY1mSPGAIb2aJ"
width="100%" height="152"></iframe>
</div>

<!-- GALLERY -->
<div class="card">
<h3>📸 Our Memories</h3>
<div class="gallery">
<img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg"><img src="5.jpg">
<img src="6.jpg"><img src="7.jpg"><img src="8.jpg"><img src="9.jpg"><img src="10.jpg">
<img src="11.jpg"><img src="12.jpg"><img src="13.jpg"><img src="14.jpg"><img src="15.jpg">
<img src="16.jpg"><img src="17.jpg"><img src="18.jpg"><img src="19.jpg"><img src="20.jpg">
</div>
</div>

<!-- PROFILE -->
<div class="card">
<p style="text-align:center; font-size:16px; line-height:1.8; color:#ffb6d9;">
💗 Liya — 20 ✨<br>
💙 Justin — 22 ✨<br>
💞 "One forever story"
</p>
</div>

<!-- LOVE LETTER -->
<div class="card loveLetter">
<h2>💌 Love Letter</h2>
<p>
My sayang 💖<br><br>
You are my peace, my home, my happiness 🥺✨<br><br>
I will always choose you no matter what 💞<br><br>
Forever yours,<br>
💖 Justin
</p>
</div>

<!-- XP -->
<div class="card">
<p id="days"></p>
<div class="xpBar"><div class="xpFill"></div></div>
</div>

</div>

<script>

/* CLOCK */
function updateTime(){
let d=new Date();
document.getElementById("time").innerText=
String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
document.getElementById("date").innerText=d.toDateString();
}
setInterval(updateTime,1000);
updateTime();

/* UNLOCK */
function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";
document.body.style.overflowY="auto";
}

/* DAYS */
let start=new Date("2024-01-01");
let now=new Date();
let diff=Math.floor((now-start)/(1000*60*60*24));
document.getElementById("days").innerHTML="💞 Together for " + diff + " days";

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","✨","🌸"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* CATS */
setInterval(()=>{
let c=document.createElement("div");
c.className="cat";
c.innerHTML=["🐱","😻","😺","🐱‍👤"][Math.floor(Math.random()*4)];
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),8000);
},2000);

</script>

</body>
</html>
