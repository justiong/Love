<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
font-family:Arial;
overflow:hidden;
color:white;
}

/* HEADER (iPhone style) */
.header{
position:fixed;
top:0;
width:100%;
padding:12px;
text-align:center;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
z-index:10;
font-weight:bold;
}

/* TIKTOK FEED */
.container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* VIDEO */
.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */
.info{
position:absolute;
bottom:90px;
left:15px;
}

.name{font-size:20px;font-weight:bold;}
.bio{opacity:0.7;}

/* ACTIONS */
.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
color:white;
font-size:18px;
cursor:pointer;
transition:0.2s;
}
.btn:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.1);
}

/* HEARTS / FLOWERS */
.heart,.flower{
position:fixed;
animation:float 5s linear forwards;
font-size:20px;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* APP OVERLAY */
#app{
display:none;
position:fixed;
inset:0;
overflow-y:auto;
padding:15px;
z-index:20;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
margin-bottom:15px;
}
.card h2,.card h3{
margin-bottom:12px;
color:#ffd6e8;
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff2e93,#ff7cc9);
color:white;
cursor:pointer;
transition:0.2s;
margin:4px 2px;
}
button:hover{
transform:scale(1.05);
opacity:0.9;
}

/* CAT */
#catBox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:30;
}

#catBox img{
width:250px;
border-radius:20px;
}

/* LOCK SCREEN */
#lockScreen{
position:fixed;
inset:0;
background:url("bg.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
z-index:999999;
color:white;
backdrop-filter:blur(10px);
transition:opacity 0.8s ease;
}

/* TIME */
.time{
font-size:60px;
margin-top:80px;
font-weight:300;
}

/* PROFILE PIC */
.profile{
text-align:center;
margin-top:-50px;
}

.pfp{
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 20px hotpink;
object-fit:cover;
}

/* FACE ID RING */
.faceRing{
width:140px;
height:140px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.3);
position:absolute;
top:45%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* SWIPE */
.swipeArea{
width:100%;
display:flex;
justify-content:center;
padding-bottom:40px;
}

#swipeBar{
width:200px;
padding:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
text-align:center;
backdrop-filter:blur(10px);
}

.loveBtn{
padding:12px 18px;
border:none;
border-radius:20px;
margin:5px;
background:rgba(255,255,255,0.15);
color:white;
backdrop-filter:blur(10px);
cursor:pointer;
transition:0.3s;
}

.loveBtn:hover{
transform:scale(1.1);
background:rgba(255,255,255,0.25);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.gallery img{
width:100%;
height:110px;
object-fit:cover;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}
.gallery img:active{
transform:scale(0.95);
}

/* FULLSCREEN VIEWER */
#viewer{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999999;
}

#viewer img{
max-width:100%;

object-fit:contain;
transition:0.3s;
}

/* PROFILE WRAP */
.profileWrap{
display:flex;
justify-content:space-between;
gap:10px;
margin-top:10px;
}

.profileBox{
flex:1;
text-align:center;
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:20px;
backdrop-filter:blur(10px);

width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid hotpink;
box-shadow:0 0 15px hotpink;
margin-bottom:8px;
}

.profileBox h2{
color:white;
margin:5px 0;
font-size:16px;
}

.profileBox p{
font-size:12px;
opacity:0.8;
color:white;
margin:2px 0;
}

/* SPOTIFY */
iframe{

</style>
</head>
