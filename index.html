<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 GOD MODE LOVE RPG 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0a1a,#2a0f2f,#000);
color:white;
overflow-x:hidden;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
margin:10px;
padding:15px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,0,120,0.3);
}

/* BUTTON */
button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff2e93,#ff66cc);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{transform:scale(1.05);}

/* PROFILE */
.profile img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid hotpink;
}

/* HEARTS */
.heart{
position:fixed;
animation:float 5s linear;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* SURPRISE */
#surprise{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
z-index:999;
text-align:center;
color:white;
}

video{
width:90%;
border-radius:20px;
}

/* CAT */
#cat{
font-size:60px;
cursor:pointer;
transition:0.3s;
}

/* ARCHERY */
.target{
width:50px;
height:50px;
background:red;
border-radius:50%;
position:absolute;
}

</style>
</head>

<body>

<div class="header">💖 GOD MODE LOVE RPG 2.0 💖</div>

<!-- PROFILE -->
<div class="card profile">
<img src="6.jpg">
<h3>💞 Liya (20) & Justin (22)</h3>
<p>📍 Kelantan ↔ Penang</p>
<p>🎓 KPM ↔ UTP</p>
<p>🏸 Archery Queen | 🎾 Tennis Boy</p>
</div>

<!-- STATUS -->
<div class="card">
<h3>💍 Relationship System</h3>
<p id="days"></p>
<p id="level"></p>
</div>

<!-- MENU -->
<div class="card">
<h3>🎮 Menu</h3>

<button onclick="openQuiz()">💖 Quiz</button>
<button onclick="openSurprise()">🌌 Surprise</button>
<button onclick="spawnHearts()">💖 Hearts</button>
<button onclick="startGallery()">📸 Gallery</button>
<button onclick="openCat()">🐱 Cat</button>
<button onclick="startArchery()">🏹 Archery</button>
<button onclick="openSpotify()">🎧 Spotify</button>

</div>

<!-- QUIZ -->
<div id="quizBox" class="card" style="display:none;">
<h3>💖 Love Quiz</h3>
<p id="q"></p>
<button onclick="answer(true)">YES</button>
<button onclick="answer(false)">NO</button>
</div>

<!-- SURPRISE -->
<div id="surprise">
<h1>💖 FOR LIYA 💖</h1>
<div id="count">3</div>

<div id="surContent" style="display:none;">
<h2>💌 Forever Love</h2>

<video id="vid" controls>
<source src="1.mp4" type="video/mp4">
</video>

<h2>💍 MARRY ME?</h2>
<button onclick="yes()">YES 💖</button>
<button onclick="yes()">YES 💖</button>

</div>
</div>

<!-- CAT -->
<div class="card">
<h3>🐱 Virtual Cat</h3>
<div id="cat" onclick="petCat()">🐱</div>
<p id="catText">Tap me!</p>
</div>

<!-- ARCHERY -->
<div class="card">
<h3>🏹 Mini Archery</h3>
<button onclick="spawnTarget()">Spawn Target</button>
<div id="gameArea"></div>
</div>

<!-- SPOTIFY -->
<div class="card">
<h3>🎧 Spotify</h3>
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/1cC0y0x"
width="100%" height="152"></iframe>
</div>

<script>

/* DAYS + LEVEL */
let start=new Date("2025-10-21");
let now=new Date();
let days=Math.floor((now-start)/86400000);

document.getElementById("days").innerText="💖 "+days+" days together";

document.getElementById("level").innerText="💍 Level "+Math.floor(days/2);

/* HEARTS */
function spawnHearts(){
for(let i=0;i<10;i++){
let d=document.createElement("div");
d.className="heart";
d.innerHTML="💖";
d.style.left=Math.random()*100+"vw";
document.body.appendChild(d);
setTimeout(()=>d.remove(),5000);
}
}

/* QUIZ */
let qList=[
"Do I love you?",
"Are we forever?",
"Do I care about you?",
"Will I stay with you?",
"Are you my happiness?"
];

let i=0,score=0;

function openQuiz(){
document.getElementById("quizBox").style.display="block";
loadQ();
}

function loadQ(){
document.getElementById("q").innerText=qList[i];
}

function answer(v){
if(v)score++;
i++;
if(i>=qList.length){
alert("💖 Score: "+score);
document.getElementById("quizBox").style.display="none";
}else loadQ();
}

/* SURPRISE */
function openSurprise(){
document.getElementById("surprise").style.display="block";
let c=3;

let t=setInterval(()=>{
c--;
document.getElementById("count").innerText=c;
spawnHearts();

if(c<=0){
clearInterval(t);
document.getElementById("count").style.display="none";
document.getElementById("surContent").style.display="block";
document.getElementById("vid").play();
}
},1000);
}

function yes(){
alert("💖 SHE SAID YES 💖");
}

/* CAT */
function petCat(){
document.getElementById("catText").innerText="💖 Meow loves you!";
spawnHearts();
}

/* ARCHERY */
function spawnTarget(){
let t=document.createElement("div");
t.className="target";
t.style.left=Math.random()*80+"vw";
t.style.top=Math.random()*60+"vh";
t.onclick=()=>{t.remove();alert("🎯 HIT!");};
document.body.appendChild(t);
}

/* GALLERY */
function startGallery(){
let img=1;
let g=setInterval(()=>{
if(img>18){clearInterval(g);}
else{
console.log("Show "+img+".jpg");
img++;
}
},800);
}

/* SPOTIFY */
function openSpotify(){
alert("🎧 Spotify already embedded below");
}

</script>

</body>
</html>
