<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 Love OS Infinity Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:black;
font-family:Arial;
overflow:hidden;
color:white;
}

/* HEADER (iPhone style) */
.header{
position:fixed;
top:0;
width:100%;
padding:12px;
text-align:center;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
z-index:10;
font-weight:bold;
}

/* TIKTOK FEED */
.container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

/* VIDEO */
.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */
.info{
position:absolute;
bottom:90px;
left:15px;
}

.name{font-size:20px;font-weight:bold;}
.bio{opacity:0.7;}

/* ACTIONS */
.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
width:45px;
height:45px;
border-radius:50%;
border:none;
background:rgba(255,255,255,0.2);
color:white;
}

/* HEARTS / FLOWERS */
.heart,.flower{
position:fixed;
animation:float 5s linear forwards;
font-size:20px;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);opacity:0;}
}

/* APP OVERLAY */
#app{
display:none;
position:fixed;
inset:0;
overflow-y:auto;
padding:15px;
z-index:20;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
margin-bottom:15px;
}

/* BUTTON */
button{
padding:10px 15px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff2e93,#ff7cc9);
color:white;
}

/* CAT */
#catBox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:30;
}

#catBox img{
width:250px;
border-radius:20px;
}
#lockScreen{
position:fixed;
inset:0;
background:url("bg.jpg") center/cover;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
z-index:999999;
color:white;
backdrop-filter:blur(10px);
}

/* TIME */
.time{
font-size:60px;
margin-top:80px;
font-weight:300;
}

/* PROFILE PIC */
.profile{
text-align:center;
margin-top:-50px;
}

.pfp{
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 20px hotpink;
object-fit:cover;
}

/* FACE ID RING */
.faceRing{
width:140px;
height:140px;
border-radius:50%;
border:2px solid rgba(255,255,255,0.3);
position:absolute;
top:45%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* SWIPE */
.swipeArea{
width:100%;
display:flex;
justify-content:center;
padding-bottom:40px;
}

#swipeBar{
width:200px;
padding:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
text-align:center;
backdrop-filter:blur(10px);
}
  .loveBtn{
padding:12px 18px;
border:none;
border-radius:20px;
margin:5px;
background:rgba(255,255,255,0.15);
color:white;
backdrop-filter:blur(10px);
cursor:pointer;
transition:0.3s;
}

.loveBtn:hover{
transform:scale(1.1);
background:rgba(255,255,255,0.25);
}
</style>
</head>

<body>
<!-- LOCK SCREEN -->
<div id="lockScreen">

<div class="time">9:41</div>

<div class="profile">
<img src="profile.jpg" class="pfp">
<h2>Liya 💖 Justin</h2>
<p>Face ID is scanning...</p>
</div>

<div class="faceRing"></div>

<!-- SWIPE -->
<div class="swipeArea" onmousedown="startSwipe(event)" ontouchstart="startSwipe(event)">
<div id="swipeBar">⬆ Swipe up to unlock</div>
</div>

</div>

<div class="header">💖 Love OS iPhone TikTok</div>

<!-- MUSIC -->
<audio id="bgm" autoplay loop>
<source src="2.mp3">
</audio>

<!-- FEED -->
<div class="container">

<!-- VIDEO 1 -->
<div class="video">
<video autoplay loop muted>
<source src="1.mp4">
</video>

<div class="info">
<div class="name">💖 Liya × Justin</div>
<div class="bio">Forever Love</div>
</div>

<div class="actions">
<button class="btn" onclick="spawnHearts()">💖</button>
<button class="btn" onclick="spawnFlowers()">🌸</button>
<button class="btn" onclick="openCat()">🐱</button>
<button class="btn" onclick="openApp()">📱</button>
</div>

</div>

<!-- VIDEO 2 -->
<div class="video">
<video autoplay loop muted>
<source src="2.mp4">
</video>

<div class="info">
<div class="name">Our Memory 💍</div>
<div class="bio">TikTok Love OS</div>
</div>

</div>

</div>

<!-- APP -->
<div id="app">

<div class="card">
<h2>💖 Welcome Back Sayang</h2>
<p>Every memory with you is my favorite.</p>
</div>

<div class="card">
<h3>🎮 Games</h3>
<button onclick="location.href='quiz.html'">Quiz</button>
<button onclick="location.href='virtual_cat.html'">Cat</button>
<button onclick="location.href='archery.html'">Archery</button>
<button onclick="location.href='forever.html'">Forever</button>
<button onclick="spawnFlowers()" class="loveBtn">🌸 Flowers</button>
<button onclick="openCat()" class="loveBtn">🐱 Cat</button>
</div>

<div class="card">
<h3>💌 Love Letter</h3>
<button onclick="openLetter()">Read</button>
</div>

</div>

<!-- CAT -->
<div id="catBox" onclick="closeCat()">
<img src="cat.gif">
</div>

<script>
  
let startY = 0;

/* FAKE FACE ID SCAN */
setTimeout(()=>{
document.querySelector(".profile p").innerText = "Face Recognized ✔";
},2000);

/* SWIPE UP DETECTION */
function startSwipe(e){
startY = e.touches ? e.touches[0].clientY : e.clientY;

document.addEventListener("mouseup",endSwipe);
document.addEventListener("touchend",endSwipe);
}

function endSwipe(e){

let endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

if(startY - endY > 80){
unlockScreen();
}

}

/* UNLOCK ANIMATION */
function unlockScreen(){

document.getElementById("lockScreen").style.transition="1s";
document.getElementById("lockScreen").style.opacity="0";
document.getElementById("lockScreen").style.filter="blur(20px)";

setTimeout(()=>{
document.getElementById("lockScreen").style.display="none";
document.getElementById("app").style.display="block";
spawnHearts();
},1000);

}

/* OPEN APP */
function openApp(){
document.getElementById("app").style.display="block";
spawnHearts();
}

/* HEARTS */
function spawnHearts(){
for(let i=0;i<20;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

/* FLOWERS */
function spawnFlowers(){
for(let i=0;i<20;i++){
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),5000);
}
}

/* CAT */
function openCat(){
document.getElementById("catBox").style.display="flex";
spawnHearts();
}

function closeCat(){
document.getElementById("catBox").style.display="none";
}

/* MUSIC */
window.addEventListener("click",()=>{
document.getElementById("bgm").play();
});

/* LETTER */
let msg = `My Sayang 💖

Every moment with you feels special.

You are the peace in my chaos,
the happiness in my heart,
and the one I always want beside me.

No matter how hard life gets,
I will always choose you.

I love your smile,
your voice,
your laugh,
and the way you make my world brighter.

Thank you for being in my life.\
Forever love you sayang 

💖 Forever your husby,
Justin`;

function openLetter(){
alert(msg);
spawnHearts();
}
function spawnFlowers(){

for(let i=0;i<25;i++){

let f = document.createElement("div");
f.innerHTML = "🌸";
f.style.position = "fixed";
f.style.left = Math.random()*100 + "vw";
f.style.top = "100vh";
f.style.fontSize = (15 + Math.random()*20) + "px";
f.style.zIndex = "9999";
f.style.pointerEvents = "none";

document.body.appendChild(f);

f.animate([
{ transform:"translateY(0)", opacity:1 },
{ transform:"translateY(-120vh)", opacity:0 }
],{
duration:4000 + Math.random()*2000,
easing:"linear"
});

setTimeout(()=>f.remove(),5000);

}

}

</script>

</body>
</html>
