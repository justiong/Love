<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Liya x Justin Love Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* VIDEO BACKGROUND */
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
opacity:0.25;
}

/* DARK OVERLAY */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(0,0,0,0.2),rgba(0,0,0,0.85));
z-index:-1;
}

/* CARD UI */
.card{
background:rgba(255,255,255,0.92);
color:black;
padding:15px;
margin:10px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,63,136,0.3);
}

/* FANCY BUTTONS */
button{
padding:12px 16px;
margin:6px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#ff2e93,#ff6bd6,#ffb3e6);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.25s;
box-shadow:0 0 10px rgba(255,63,136,0.4);
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(255,63,136,0.8);
}

button:active{
transform:scale(0.95);
}

/* PROFILE */
.profile{
text-align:center;
}

.profile img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid #ff3f88;
box-shadow:0 0 15px #ff3f88;
object-fit:cover;
}

/* CHAT */
#chatBox{
height:150px;
overflow-y:auto;
background:#fff;
color:black;
padding:10px;
border-radius:10px;
}

.msg{
padding:6px;
margin:5px;
background:#eee;
border-radius:10px;
}




@keyframes floatUp {
0% {
transform: translateY(100vh);
opacity: 1;
}
100% {
transform: translateY(-120vh);
opacity: 0;
}
}
.heart {
position: fixed;
font-size: 22px;
z-index: 9999;
animation: floatUp 6s linear forwards;
pointer-events: none;
}
.flower {
position: fixed;
font-size: 25px;
z-index: 9999;
animation: floatUp 5s linear forwards;
pointer-events: none;
}
/* LEVEL BAR */
.levelBar{
width:100%;
height:12px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.levelFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff3f88,#ff69b4);
transition:0.5s;
}

/* LOGIN SCREEN */
#login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff3f88,#ffb6e6);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

input{
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video id="bgVideo" autoplay muted loop>
<source src="bg.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
<source src="2.mp3" type="audio/mpeg">
</audio>

<!-- LOGIN -->
<div id="login">
<h2>💖 Enter Name</h2>
<input id="name" placeholder="Justin / Liya">
<br><br>
<button onclick="startGame()">Start Game 💕</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card profile">
<img src="6.jpg">
<h3>💞 TikTok Profile</h3>
💗 Liya | 💙 Justin
</div>

<div class="card">
<h3>🎵 Spotify</h3>
<iframe width="100%" height="152"
src="https://open.spotify.com/embed/playlist/6AnczgR8DnY1mSPGAIb2aJ"></iframe>
</div>

<div class="card">
<h3>💍 Level</h3>
<div id="levelText">Level 1</div>
<div class="levelBar"><div id="bar" class="levelFill"></div></div>
</div>

<div class="card">
<h3>📅 Days Together</h3>
<div id="days"></div>
</div>

<div class="card">
<h3>⚡ XP</h3>
<div id="xp"></div>
</div>

<!-- CHAT -->
<div class="card">
<h3>💬 Live Chat</h3>
<div id="chatBox"></div>
<input id="msg">
<button onclick="sendMsg()">Send</button>
</div>

<!-- BUTTONS -->
<div class="card">
<h3>🎮 Menu</h3>


<button onclick="spawnFlower()">🌸 Flower</button>
<button onclick="spawnHeart()">💖 Heart</button>
<button onclick="openLetter()">💌 Motivation</button>
<button onclick="window.location.href='virtual_cat.html'">🐱 Cat</button>
<button onclick="window.location.href='school.html'">🏫 School</button>
<button onclick="window.location.href='archery.html'">🏹 Archery</button>

<button onclick="showQR()">📱 Scan Love QR</button>
</div>
</div>

<!-- LETTER -->
  <div id="letterBox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);justify-content:center;align-items:center;z-index:9999;">
  <div class="card" style="width:85%;max-width:400px;text-align:center;">
    <h3>💌 Motivation Letter</h3>
    
    <p id="typedText" style="min-height:120px;white-space:pre-wrap;"></p>

    <button onclick="closeLetter()">Close 💖</button>

  </div>
</div>
  <div class="card" style="text-align:center;max-width:300px;">

<h3>💌 Scan My Love</h3>

<img id="qrImg"
style="
width:220px;
border-radius:15px;
margin:10px;
box-shadow:0 0 20px pink;
">

<br>

<button onclick="closeQR()">Close 💖</button>

</div>
</div>
  <div class="card" style="text-align:center;max-width:320px;">

<h3>💌 Scan My Love</h3>

<img id="qrImg"
style="
width:220px;
border-radius:15px;
margin:10px;
box-shadow:0 0 20px pink;
">

<br>

<button onclick="closeQR()">Close 💖</button>

</div>
</div>

<script>

let user="";
let i=0;
let typingInterval;

/* START */
function startGame(){
let user=document.getElementById("name").value;

if(user.trim()===""){
alert("Please enter name 💖");
return;
}

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

/* DAYS */
let start=new Date("2025-10-21");
let now=new Date();
let days=Math.floor((now-start)/86400000);

document.getElementById("days").innerText=days+" days 💖";

/* LEVEL */
let level=Math.min(100,Math.floor(days/2)+1);
document.getElementById("levelText").innerText="Level "+level;
document.getElementById("bar").style.width=level+"%";

/* XP */
document.getElementById("xp").innerText=days*3+"/100 XP";

/* MUSIC */
let audio=document.getElementById("bgMusic");
audio.volume=0.5;
audio.play().catch(()=>{});
}

/* CHAT */cument.get
function sendMsg(){
let m=document.getElementById("msg").value;
if(!m)return;

let d=document.createElement("div");
d.className="msg";
d.innerText=user+": "+m;
document.getElementById("chatBox").appendChild(d);
document.getElementById("msg").value="";
}

/* 🌸 FLOWER */
function spawnFlower(){
for(let f=0; f<12; f++){
let el=document.createElement("div");
el.className="flower";
el.innerHTML="🌸";
el.style.left=Math.random()*100+"vw";
el.style.top="100vh";
document.body.appendChild(el);
setTimeout(()=>el.remove(),5000);
}
}

/* 💖 HEART */
function spawnHeart(){
for(let h=0; h<10; h++){
let el=document.createElement("div");
el.className="heart";
el.innerHTML="💖";
el.style.left=Math.random()*100+"vw";
el.style.top="100vh";
document.body.appendChild(el);
setTimeout(()=>el.remove(),6000);
}
}

/* 💌 LETTER */
let letterText = `💌 My sayang,

I know your assignment feels heavy sometimes 🥺
But I want you to remember this…

You are strong 💖
You are capable 🌸
You are not alone ✨

Take it slowly step by step 💫
I believe in you 🏹
Forever love you sayang

Forever your husby,
💖 Justin`;

function openLetter(){
document.getElementById("letterBox").style.display="flex";
document.getElementById("typedText").innerText="";
i=0;
typeWriter();
}

function typeWriter(){
if(i < letterText.length){
document.getElementById("typedText").innerHTML += letterText.charAt(i);
i++;
typingInterval=setTimeout(typeWriter,25);
}
}

function closeLetter(){
document.getElementById("letterBox").style.display="none";
clearTimeout(typingInterval);
}
  function showQR(){
document.getElementById("qrBox").style.display="flex";

/* CHANGE THIS LINK */
let link = "forever.html";

document.getElementById("qrImg").src =
"https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" + link;
}

function closeQR(){
document.getElementById("qrBox").style.display="none";
}
<!-- QR POPUP -->
<div id="qrBox"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
">


</script>

</body>
</html>
