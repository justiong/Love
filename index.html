<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Love OS MAX Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */
#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
opacity:0.25;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,transparent,#000);
z-index:-1;
}

/* CARD */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
margin:10px;
padding:15px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

/* BUTTON */
button{
padding:10px 14px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff4d6d,#ff99cc);
color:white;
font-weight:bold;
cursor:pointer;
margin:5px;
}
button:hover{transform:scale(1.05);}

/* PROFILE */
.profile{
text-align:center;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid pink;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(45deg,#ff4d6d,#1a1a2e);
z-index:999;
}

/* HEART */
.heart{
position:fixed;
animation:float 5s linear;
pointer-events:none;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* SURPRISE */
#surprise{
display:none;
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(45deg,#ff4d6d,#1a1a2e);
z-index:9999;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop>
<source src="bg.mp4">
</video>
<div class="overlay"></div>

<audio id="music" loop>
<source src="2.mp3">
</audio>

<!-- LOGIN -->
<div id="login">
<h2>💖 Enter Name</h2>
<input id="name">
<br><br>
<button onclick="start()">Start 💕</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<!-- PROFILE -->
<div class="card profile">
<img src="6.jpg">
<h2>💞 Liya x Justin</h2>

<p id="status">💌 Love loading...</p>

<p>
💖 Love Level: <span id="love">0</span>/100<br>
🎭 Mood: <span id="mood">Calm</span><br>
📅 Days: <span id="days"></span><br>
⚡ XP: <span id="xp"></span>
</p>

<button onclick="changeStatus()">Status</button>
<button onclick="mood()">Mood</button>
<button onclick="boost()">Boost 💖</button>
</div>

<!-- MENU -->
<div class="card">
<h3>🎮 Menu</h3>

<button onclick="heart()">💖 Heart</button>
<button onclick="cat()">🐱 Cat</button>
<button onclick="gallery()">📸 Gallery</button>
<button onclick="quiz()">🎮 Quiz</button>
<button onclick="surprise()">💍 Marry Me</button>

</div>

<!-- CHAT -->
<div class="card">
<h3>💬 Chat</h3>
<div id="chat"></div>
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

<!-- SURPRISE END -->
<div id="surprise">
<h1>💍 WILL YOU MARRY ME? 💍</h1>

<button onclick="yes()">YES 💖</button>
<button onclick="yes()">YES 💕</button>

<br><br>

<video id="finalVideo" width="90%" controls>
<source src="1.mp4">
</video>

<h2>💖 Forever Together 💖</h2>
</div>

<script>

let name="";
let love=0;

/* START */
function start(){
name=document.getElementById("name").value;
if(!name)return;

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("music").play();

let start=new Date("2025-01-01");
let now=new Date();
let d=Math.floor((now-start)/86400000);

document.getElementById("days").innerText=d;
document.getElementById("xp").innerText=d*5;
}

/* PROFILE ACTIONS */
function changeStatus(){
let texts=[
"I love you 💖",
"You are my world 🌸",
"My forever person 💕"
];
document.getElementById("status").innerText =
texts[Math.floor(Math.random()*texts.length)];
}

function mood(){
let moods=["Happy 😊","Miss you 😢","In Love 💖","Crazy 😍"];
document.getElementById("mood").innerText =
moods[Math.floor(Math.random()*moods.length)];
}

function boost(){
love+=10;
if(love>100)love=100;
document.getElementById("love").innerText=love;
heart();
}

/* HEART */
function heart(){
for(let i=0;i<10;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

/* CAT */
function cat(){
alert("🐱 Meow~ I love you sayang 💖");
}

/* GALLERY */
function gallery(){
let w=window.open("");
let html="<h1>📸 Gallery</h1>";
for(let i=1;i<=18;i++){
html+=`<img src="${i}.jpg" width="100">`;
}
w.document.write(html);
}

/* QUIZ */
function quiz(){
alert("🎮 Quiz coming soon 💖");
}

/* SURPRISE */
function surprise(){
document.getElementById("surprise").style.display="flex";
setTimeout(()=>document.getElementById("finalVideo").play(),2000);
}

/* YES */
function yes(){
alert("💖 She said YES!! Forever Love 💖");
}

/* CHAT */
function send(){
let m=document.getElementById("msg").value;
if(!m)return;
let d=document.createElement("div");
d.innerText=name+": "+m;
document.getElementById("chat").appendChild(d);
}

</script>

</body>
</html>
