<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Liya x Justin Forever App 💖</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffb6e6,#fff,#ffd6ff);
}

header{
background:#ff3f88;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.section{padding:10px;}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:20px;
box-shadow:0 0 15px rgba(255,105,180,0.2);
}

.btn{
display:inline-block;
padding:10px 14px;
margin:5px;
border-radius:20px;
background:#ff3f88;
color:white;
border:none;
cursor:pointer;
text-decoration:none;
}

#chatBox{
height:250px;
overflow-y:auto;
border:1px solid #ddd;
padding:10px;
border-radius:10px;
}

.msg{
padding:8px;
margin:5px;
border-radius:10px;
max-width:70%;
}
.me{background:#ff3f88;color:white;margin-left:auto;}
.her{background:#eee;}

input{
width:70%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.gallery{
display:flex;
overflow-x:auto;
gap:5px;
}

.gallery img{
width:120px;
height:120px;
border-radius:10px;
object-fit:cover;
}

#loveLetterBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.letterCard{
background:white;
padding:20px;
border-radius:15px;
width:80%;
}
</style>
</head>

<body>

<header>💖 Liya x Justin Forever App 💖</header>

<!-- PROFILE + DAYS -->
<div class="section">
  <div class="card">
    <h3>💞 Profile</h3>
    💗 Liya — Born 1 April<br>
    💙 Justin — Born 12 October
  </div>

  <div class="card">
    <h3>📅 Days Together</h3>
    <p id="days"></p>
  </div>
</div>

<!-- BUTTONS -->
<div class="section">
  <div class="card">
    <h3>🎮 Menu</h3>

    <button class="btn" onclick="spawnFlower()">🌸 Flower</button>
    <button class="btn" onclick="openSchool()">🏫 School</button>
    <button class="btn" onclick="openLetter()">💌 Motivation</button>

    <a class="btn" href="virtual_cat.html">🐱 Cat</a>
    <a class="btn" href="archery.html">🏹 Game</a>
  </div>
</div>

<!-- MEMORIES -->
<div class="section">
  <div class="card">
    <h3>📸 Memories (18)</h3>
    <div class="gallery">
      <img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg"><img src="5.jpg">
      <img src="6.jpg"><img src="7.jpg"><img src="8.jpg"><img src="9.jpg"><img src="10.jpg">
      <img src="11.jpg"><img src="12.jpg"><img src="13.jpg"><img src="14.jpg"><img src="15.jpg">
      <img src="16.jpg"><img src="17.jpg"><img src="18.jpg">
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="section">
  <div class="card">
    <h3>💬 Live Chat</h3>
    <div id="chatBox"></div><br>
    <input id="msg" placeholder="Type message">
    <button class="btn" onclick="sendMsg()">Send</button>
  </div>
</div>

<!-- LOVE LETTER -->
<div id="loveLetterBox">
  <div class="letterCard">
    <h3>💌 Motivation Letter</h3>
    <p>
      My sayang 💖<br><br>
      You are strong, don’t give up on your assignment 🥺✨<br>
      I always believe in you 💫<br><br>
      Forever yours 💖
    </p>
    <button class="btn" onclick="closeLetter()">Close</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  databaseURL:"YOUR_DB",
  projectId:"YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = prompt("Justin or Liya?");

function sendMsg(){
let m=document.getElementById("msg").value;
if(!m) return;
db.ref("chat").push({user:user,text:m});
document.getElementById("msg").value="";
}

db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.classList.add("msg");
div.classList.add(d.user===user?"me":"her");
div.innerHTML=d.user+": "+d.text;
document.getElementById("chatBox").appendChild(div);
});

// DAYS
let start=new Date("2025-10-21");
let now=new Date();
let diff=Math.floor((now-start)/(1000*60*60*24));
document.getElementById("days").innerText=diff+" days 💖";

function openSchool(){alert("School page");}
function spawnFlower(){alert("🌸🌸🌸");}
function openLetter(){document.getElementById("loveLetterBox").style.display="flex";}
function closeLetter(){document.getElementById("loveLetterBox").style.display="none";}
</script>

</body>
</html>
