<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Liya x Justin Forever App 💖</title>

<style>

body{
margin:0;
font-family:Arial;
overflow-x:hidden;
background:black;
color:white;
}

/* LOCK SCREEN */
#lock{
position:fixed;
width:100%;
height:100%;
background:url('1.jpg');
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:9999;
}

#time{
font-size:60px;
font-weight:bold;
text-shadow:0 0 20px pink;
}

#date{
font-size:18px;
margin-bottom:20px;
}

#swipe{
padding:15px 25px;
background:rgba(255,20,147,0.8);
border-radius:40px;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:20px;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
}

/* CARD */
.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
margin:10px;
}

h1{
text-align:center;
color:#ff4fd8;
}

/* BUTTON */
.petBtn{
display:inline-block;
padding:12px 20px;
margin:10px;
border-radius:25px;
background:linear-gradient(90deg,#ff1493,#ff69b4);
color:white;
text-decoration:none;
font-weight:bold;
}

/* GALLERY */
.gallery{
display:flex;
overflow-x:auto;
}

.gallery img{
width:120px;
height:120px;
margin:5px;
border-radius:15px;
object-fit:cover;
}

/* XP BAR */
.xpBar{
width:90%;
height:15px;
background:#333;
border-radius:20px;
margin:10px auto;
overflow:hidden;
}

.xpFill{
width:70%;
height:100%;
background:linear-gradient(90deg,#ff1493,#ff69b4);
}

/* FLOAT HEART */
.heart{
position:fixed;
font-size:20px;
animation:floatUp 6s linear infinite;
z-index:9998;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* FLOAT CAT */
.cat{
position:fixed;
font-size:35px;
animation:catMove 8s linear infinite;
z-index:9999;
}

@keyframes catMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* FLOWER */
.flower{
position:fixed;
font-size:25px;
animation:floatUp 5s linear forwards;
z-index:9999;
}

</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock">
<div id="time">00:00</div>
<div id="date">Loading date...</div>
<div id="swipe" onclick="unlock()">Swipe Up 💖</div>
</div>

<!-- APP -->
<div id="app">

<h1>💖 Liya x Justin Forever 💖</h1>

<!-- BUTTONS -->
<div class="card" style="text-align:center;">

<a href="virtual_cat.html" class="petBtn">🐱 Virtual Cat</a>

<button class="petBtn" onclick="spawnFlower()">🌸 Flower</button>

</div>

<!-- SPOTIFY -->
<div class="card">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/playlist/6AnczgR8DnY1mSPGAIb2aJ"
width="100%" height="152"></iframe>
</div>

<!-- PROFILE -->
<div class="card">
<p style="text-align:center; font-size:16px; line-height:1.8; color:#ffb6d9;">
💗 Liya — 20 ✨<br>
💙 Justin — 22 ✨<br>
💞 “One forever story”
</p>
</div>

<!-- GALLERY -->
<div class="card">
<h3>📸 Our Memories</h3>
<div class="gallery">
<img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg"><img src="5.jpg">
<img src="6.jpg"><img src="7.jpg"><img src="8.jpg"><img src="9.jpg"><img src="10.jpg">
<img src="11.jpg"><img src="12.jpg"><img src="13.jpg"><img src="14.jpg"><img src="15.jpg">
<img src="16.jpg"><img src="17.jpg"><img src="18.jpg"><img src="19.jpg"><img src="20.jpg">
</div>
</div>

<!-- LOVE LETTER -->
<div class="card">
<h3>💌 Love Letter</h3>
<p>
My sayang 💖<br><br>
You are my peace, my home, my everything 🥺✨<br><br>
Forever yours,<br>
💖 Justin
</p>
</div>

<!-- DAYS -->
<div class="card">
<p id="days"></p>
<div class="xpBar"><div class="xpFill"></div></div>
</div>

</div>

<script>

/* UNLOCK */
function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";
}

/* CLOCK */
setInterval(()=>{
let d=new Date();
document.getElementById("time").innerText=
String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
document.getElementById("date").innerText=d.toDateString();
},1000);

/* DAYS */
let start=new Date("2025-10-21");
let now=new Date();
let diff=Math.floor((now-start)/(1000*60*60*24));
document.getElementById("days").innerHTML="💞 Together for " + diff + " days";

/* HEART ANIMATION */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=["💖","💕","✨","💗"][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* CAT ANIMATION */
setInterval(()=>{
let c=document.createElement("div");
c.className="cat";
c.innerHTML=["🐱","😻","🐾","🐱‍👤"][Math.floor(Math.random()*4)];
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),8000);
},2000);

/* FLOWER BUTTON */
function spawnFlower(){
for(let i=0;i<10;i++){
let f=document.createElement("div");
f.className="flower";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
f.style.top="80vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),5000);
}
}

</script>

</body>
</html>
