<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Liya x Justin Forever App 💖</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* LOCK */
#lock{
position:fixed;
width:100%;
height:100%;
background:url('1.jpg');
background-size:cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#time{font-size:60px;text-shadow:0 0 20px pink;}
#date{margin:10px;}
#swipe{
padding:15px 25px;
background:#ff3f88;
border-radius:30px;
cursor:pointer;
}

/* APP */
#app{display:none;padding:15px;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;}

h1{text-align:center;color:#ff4fd8;}

/* BUTTONS */
.petBtn{
display:inline-block;
padding:12px 18px;
margin:6px;
border-radius:25px;
background:linear-gradient(90deg,#ff1493,#ff69b4);
color:white;
text-decoration:none;
border:none;
cursor:pointer;
}

/* CARDS */
.card{
background:rgba(255,255,255,0.1);
padding:15px;
margin:10px;
border-radius:15px;
}

/* GALLERY */
.gallery{display:flex;overflow-x:auto;}
.gallery img{width:120px;height:120px;margin:5px;border-radius:10px;}

/* HEARTS */
.heart{
position:fixed;
animation:floatUp 6s linear infinite;
}
@keyframes floatUp{0%{transform:translateY(100vh);}100%{transform:translateY(-120vh);}}

/* CHAT */
#chatBox{height:200px;overflow-y:auto;background:#111;padding:10px;border-radius:10px;}
.msg{padding:8px;margin:5px;border-radius:10px;max-width:70%;}
.me{background:#ff3f88;margin-left:auto;}
.her{background:white;color:black;}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lock">
<div id="time">00:00</div>
<div id="date"></div>
<div id="swipe" onclick="unlock()">Swipe Up 💖</div>
</div>

<!-- APP -->
<div id="app">

<h1>💖 Liya x Justin Forever 💖</h1>

<!-- BUTTONS -->
<div class="card" style="text-align:center;">

<a href="virtual_cat.html" class="petBtn">🐱 Cat</a>
<button class="petBtn" onclick="spawnFlower()">🌸 Flower</button>
<button class="petBtn" onclick="openLetter()">💌 Letter</button>
<a href="archery.html" class="petBtn">🏹 Game</a>
<button class="petBtn" onclick="toggleChat()">💬 Chat</button>

</div>

<!-- SPOTIFY -->
<div class="card">
<iframe src="https://open.spotify.com/embed/playlist/6AnczgR8DnY1mSPGAIb2aJ"
width="100%" height="152"></iframe>
</div>

<!-- PROFILE -->
<div class="card">
<h3>💞 Real Profile</h3>
💗 Liya — Archery Queen<br>
💙 Justin — Tennis Player<br>
<i>Forever story 💞</i>
</div>

<!-- MEMORIES -->
<div class="card">
<h3>📸 Memories</h3>
<div class="gallery">
<img src="1.jpg"><img src="2.jpg"><img src="3.jpg"><img src="4.jpg">
</div>
</div>

<!-- LETTER -->
<div class="card">
<h3>💌 Love Letter</h3>
<p>You are my everything 💖</p>
</div>

<!-- CHAT -->
<div class="card" id="chatSection" style="display:none;">
<h3>💬 Live Chat</h3>
<div id="chatBox"></div>
<input id="msgInput" placeholder="Message...">
<button onclick="sendMsg()">Send</button>
</div>

</div>

<!-- FIREBASE (OPTIONAL - FILL YOUR KEY) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
apiKey:"YOUR_KEY",
databaseURL:"YOUR_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = prompt("Justin / Liya");

// CHAT
function sendMsg(){
let msg=document.getElementById("msgInput").value;
if(!msg) return;

db.ref("chat").push({user:user,text:msg});
document.getElementById("msgInput").value="";
}

db.ref("chat").on("child_added",snap=>{
let d=snap.val();
let div=document.createElement("div");
div.className="msg "+(d.user==user?"me":"her");
div.innerHTML=d.user+": "+d.text;
document.getElementById("chatBox").appendChild(div);
});

function toggleChat(){
let c=document.getElementById("chatSection");
c.style.display=c.style.display==="none"?"block":"none";
}

// LOCK
function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";
}

// CLOCK
setInterval(()=>{
let d=new Date();
document.getElementById("time").innerText=
String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
document.getElementById("date").innerText=d.toDateString();
},1000);

// FLOWER
function spawnFlower(){
for(let i=0;i<10;i++){
let f=document.createElement("div");
f.className="heart";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),5000);
}
}
</script>

</body>
</html>
