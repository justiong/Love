<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow-x:hidden;
}

/* LOCK */
#lock{
position:fixed;
width:100%;
height:100%;
background:url('1.jpg');
background-size:cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

#time{
font-size:60px;
text-shadow:0 0 20px pink;
}

#date{margin:10px;}

#swipe{
padding:15px 25px;
background:#ff3f88;
border-radius:30px;
cursor:pointer;
}

/* APP */
#app{
display:none;
padding:15px;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
min-height:100vh;
}

h1{text-align:center;color:#ff4fd8;}

/* BUTTONS */
.petBtn{
display:inline-block;
padding:12px 18px;
margin:6px;
border-radius:25px;
background:linear-gradient(90deg,#ff1493,#ff69b4);
color:white;
text-decoration:none;
border:none;
cursor:pointer;
}

/* CARD */
.card{
background:rgba(255,255,255,0.1);
padding:15px;
margin:10px;
border-radius:15px;
}

/* GALLERY */
.gallery{
display:flex;
overflow-x:auto;
}
.gallery img{
width:120px;height:120px;margin:5px;border-radius:10px;
}

/* HEARTS */
.heart{
position:fixed;
animation:floatUp 6s linear infinite;
}
@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-120vh);}
}

/* CHAT */
#chatBox{
height:250px;
overflow-y:auto;
background:#111;
padding:10px;
border-radius:10px;
}

.msg{
padding:8px;
margin:5px;
border-radius:10px;

}

.me{background:#ff3f88;margin-left:auto;}
.her{background:white;color:black;}

input{
width:70%;
padding:10px;

<body>

<script>
// LOCK
function unlock(){
document.getElementById("lock").style.display="none";
document.getElementById("app").style.display="block";
}

// CLOCK
setInterval(()=>{
let d=new Date();
document.getElementById("time").innerText=
String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");

// FLOWER
function spawnFlower(){
for(let i=0;i<10;i++){
let f=document.createElement("div");
f.className="heart";
f.innerHTML="🌸";
f.style.left=Math.random()*100+"vw";
document.body.appendChild(f);
setTimeout(()=>f.remove(),5000);
}
}

// CHAT TOGGLE
function toggleChat(){
let c=document.getElementById("chatSection");
c.style.display = (c.style.display==="none")?"block":"none";
}

// SIMPLE LOCAL CHAT (WORKING WITHOUT FIREBASE)
function sendMsg(){
let msg=document.getElementById("msgInput").value;
if(!msg) return;

let div=document.createElement("div");
div.className="msg me";
div.innerHTML="You: "+msg;

document.getElementById("chatBox").appendChild(div);
document.getElementById("msgInput").value="";

// fake reply

let r=document.createElement("div");
r.className="msg her";
r.innerHTML="Liya: 💖 I saw your message";
document.getElementById("chatBox").appendChild(r);

}
